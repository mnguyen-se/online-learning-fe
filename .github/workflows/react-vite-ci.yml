name: React Vite CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Build
        run: npm run build

  deploy-render:
    needs: build-test
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FE }}

  send-email:
    if: always()
    needs: [build-test, deploy-render]
    runs-on: ubuntu-latest

    steps:
      - name: 📧 Send CI result email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Result (FE): ${{ needs.build-test.result }}"
          to: nguyennmse184571@fpt.edu.vn
          from: GitHub CI/CD <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Hello,

            The FE React CI pipeline has finished.

            Result: ${{ needs.build-test.result }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Render deploy triggered automatically.

            Regards,
            GitHub Actions